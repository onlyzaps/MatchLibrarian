name: Compile and Release MatchLibrarian

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

# Change this single variable for any future plugins!
env:
  PLUGIN_NAME: MatchLibrarian

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump Version and Create Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore ${{ env.PLUGIN_NAME }}.csproj

      - name: Build and Publish
        run: dotnet publish ${{ env.PLUGIN_NAME }}.csproj -c Release -o ./publish_temp

      - name: Prepare Folder Structure
        run: |
          mkdir -p ./release_stage/addons/counterstrikesharp/plugins/${{ env.PLUGIN_NAME }}
          mv ./publish_temp/${{ env.PLUGIN_NAME }}.dll ./release_stage/addons/counterstrikesharp/plugins/${{ env.PLUGIN_NAME }}/
          mv ./publish_temp/${{ env.PLUGIN_NAME }}.pdb ./release_stage/addons/counterstrikesharp/plugins/${{ env.PLUGIN_NAME }}/
          mv ./publish_temp/${{ env.PLUGIN_NAME }}*.json ./release_stage/addons/counterstrikesharp/plugins/${{ env.PLUGIN_NAME }}/

      - name: Zip Release Artifact
        run: |
          cd release_stage
          zip -r "${{ env.PLUGIN_NAME }}-${{ steps.tag_version.outputs.new_tag }}.zip" addons/

      - name: Upload Build Artifact (Actions Tab)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ steps.tag_version.outputs.new_tag }}
          path: release_stage/${{ env.PLUGIN_NAME }}-${{ steps.tag_version.outputs.new_tag }}.zip
          retention-days: 7

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          files: release_stage/${{ env.PLUGIN_NAME }}-${{ steps.tag_version.outputs.new_tag }}.zip
          generate_release_notes: true
